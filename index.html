<!DOCTYPE html>
<html>
<head>
    <script>
        function playSound() {
            var audio = new Audio('audio.mp3'); // Replace 'your-audio-file.mp3' with the path to your audio file
            audio.play();
        }
    </script>
</head>
<body>
    <img src="image.png" alt="Image" onclick="playSound()" style="cursor: pointer;">
</body>
</html>
